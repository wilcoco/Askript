# Railway 배포 설정. 깃에 푸시하면 이 설정으로 자동 빌드/배포한다.
# Dockerfile 빌더를 쓰면 한글 폰트(나눔)까지 컨테이너에 포함된다.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 셸 변수 확장에 의존하지 않도록 python 진입점으로 기동한다(PORT 는 main.py 가 읽음).
startCommand = "python main.py"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
